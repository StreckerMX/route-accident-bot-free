route:
  origin: "Tijuana"
  destination: "Hermosillo"
  travel_mode: "DRIVE"

monitor:
  interval_minutes: 45
  jam_delay_threshold_minutes: 13
  cooldown_minutes: 15

investigation:
  language: "es"
  max_news_results: 5
  search_queries:
    - "accidente {road} {city}"
    - "choque {road} {city} hoy"
    - "tráfico {road} {city}"

advisor:
  alternative_routes: 2
  recommend_switch_if_saves_minutes: 10

telegram:
  enabled: false
  notify_on_alert: true
  notify_on_ok: false